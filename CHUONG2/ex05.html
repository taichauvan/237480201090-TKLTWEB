<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài tập 2.5</title>
  </head>
  <body>
    <p><b>Đăng ký thể thao</b></p>

    <p align="left">
      <font face="Tahoma" size="3">
        <b>TRƯỜNG ĐẠI HỌC BẠC LIÊU</b><br />
        KHOA KỸ THUẬT VÀ CÔNG NGHỆ
      </font>
    </p>

    <p align="right">
      <font face="Tahoma" size="3">
        <b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br />
        Độc lập - Tự do - Hạnh phúc
      </font>
    </p>

    <h1 align="center">
      <font face="Verdana" color="Red">PHIẾU ĐĂNG KÝ DỰ THI THỂ THAO</font>
    </h1>

    <hr />

    <form action="#">
      <table border="0" cellpadding="5">
        <tr>
          <td>Họ tên:</td>
          <td><input type="text" name="txtHoten" size="30" /></td>
        </tr>
        <tr>
          <td>Mật khẩu:</td>
          <td><input type="password" name="txtMatkhau" size="30" /></td>
        </tr>
        <tr>
          <td valign="top">Môn thể thao:</td>
          <td>
            <input type="checkbox" name="chk1" /> Bóng đá <br />
            <input type="checkbox" name="chk2" /> Bóng chuyền <br />
            <input type="checkbox" name="chk3" /> Điền kinh <br />
            <input type="checkbox" name="chk4" /> Bơi lội
          </td>
        </tr>
      </table>

      <p><b>PHẦN CỨNG MÁY TÍNH</b></p>

      <table border="0" cellpadding="5">
        <tr>
          <td valign="top">
            Thiết bị:<br />
            <select name="selThietbi" size="4">
              <option>CPU</option>
              <option>Mainboard</option>
              <option>ASUS DVD</option>
              <option>RAM KingMax</option>
            </select>
          </td>
          <td valign="top">
            Thời gian bảo hành:<br />
            <select name="selBaohanh">
              <option>1 năm</option>
              <option>2 năm</option>
              <option>3 năm</option>
            </select>
          </td>
        </tr>
      </table>

      <p>
        <input type="submit" value="Submit" />
        <input type="reset" value="Reset" />
      </p>
    </form>

    <hr />
  </body>
</html>
