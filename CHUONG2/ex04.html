<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài 2.4 - Đăng ký xét tuyển</title>
  </head>
  <body>
    <br />

    <p align="left">
      <font face="Tahoma" size="3">
        <b>TRƯỜNG ĐẠI HỌC BẠC LIÊU</b><br />
        <b>KHOA KỸ THUẬT VÀ CÔNG NGHỆ</b>
      </font>
    </p>

    <p align="right">
      <font face="Tahoma" size="3">
        <b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br />
        <b>Độc lập - Tự do - Hạnh phúc</b>
      </font>
    </p>

    <br clear="all" />
    <h1 align="center">
      <font face="Verdana" size="6" color="red">ĐĂNG KÝ XÉT TUYỂN</font>
    </h1>

    <hr />

    <form>
      <table align="center" border="0" cellpadding="5">
        <tr>
          <td align="left">Họ tên:</td>
          <td><input type="text" name="hoten" size="40" /></td>
        </tr>
        <tr>
          <td align="left">Giới tính:</td>
          <td>
            <input type="radio" name="gioitinh" value="Nam" checked /> Nam
            &nbsp;&nbsp;&nbsp;
            <input type="radio" name="gioitinh" value="Nu" /> Nữ
          </td>
        </tr>
        <tr>
          <td align="left" valign="top">Ngành thi:</td>
          <td>
            <input type="radio" name="nganh" value="CNTT" checked /> Công nghệ
            thông tin <br />
            <input type="radio" name="nganh" value="Mamnon" /> Mầm non <br />
            <input type="radio" name="nganh" value="Amnhac" /> Âm nhạc
          </td>
        </tr>
        <tr>
          <td></td>
          <td align="left">
            <br />
            <input type="submit" value="Đồng ý" />
            &nbsp;&nbsp;
            <input type="reset" value="Không đồng ý" />
          </td>
        </tr>
      </table>
    </form>

    <hr />
  </body>
</html>
